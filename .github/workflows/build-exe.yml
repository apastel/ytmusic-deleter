# This workflow builds and tests the Windows installer for YTMusic Deleter.

name: Build and Verify (Windows)

on:
  push:
    branches: # prevent push on tags since that's handled by another workflow
      - '**'
    paths-ignore:
      - '**.md'
      - '.flake8'
      - '.gitignore'
      - '.pre-commit-comfig.yaml'
      - '**/build-deb.yml'
      - '**/build-dmg.yml'
      - '**/pytest.yml'
      - '**/release.yml'
  pull_request_target:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 10 * * *'

concurrency:
  group: build-exe-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      installer-version: ${{ steps.create_installer.outputs.version }}
    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: pdm-project/setup-pdm@v4

    - name: Install dependencies
      run: |
        pdm --no-cache install --no-editable

    - name: Run CLI from venv
      id: run-cli
      run: |
        . .venv/Scripts/activate
        echo "version=$(ytmusic-deleter --version)"

    - name: Run GUI app
      uses: nick-fields/retry@v4
      with:
        max_attempts: 3
        timeout_minutes: 1
        shell: bash
        command: |

          # Makes app run headless
          export QT_QPA_PLATFORM=offscreen

          # Launch the GUI app and kill it after 10 seconds
          set +e
          timeout 10s pdm gui
          status=$?
          set -e
          if [ "$status" = 124 ]; then
            echo "GUI started and was still running after 10s"
          else
            echo "GUI failed with exit code $status"
            exit 1
          fi

    - name: Install Microsoft VC++ Redistributable (2015-2022 x64)
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $installerPath = Join-Path $env:RUNNER_TEMP "vc_redist.x64.exe"

        Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile $installerPath
        $proc = Start-Process -FilePath $installerPath -ArgumentList "/install", "/quiet", "/norestart" -Wait -PassThru

        # Success/acceptable codes:
        # 0    = success
        # 1638 = another version already installed
        # 3010 = success, reboot required
        if ($proc.ExitCode -notin 0, 1638, 3010) {
          throw "vc_redist installer failed with exit code $($proc.ExitCode)"
        }

    - name: Freeze exe
      run: |
        pdm run pyinstaller gui/src/main/python/gui.spec

    - name: Run frozen exe
      run: |

        # Makes app run headless
        export QT_QPA_PLATFORM=offscreen

        # Launch frozen app and kill it after 10 seconds
        set +e
        timeout 10s ./dist/YTMusic_Deleter/YTMusic_Deleter.exe
        status=$?
        set -e
        if [ "$status" = 124 ]; then
          echo "GUI started and was still running after 10s"
        else
          echo "GUI failed with exit code $status"
          exit 1
        fi

    - name: Install NSIS (Winget with Choco fallback)
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        function Get-NSISDir {
          $cmd = Get-Command makensis -ErrorAction SilentlyContinue
          if ($cmd) {
            return (Split-Path $cmd.Source -Parent)
          }

          $candidates = @(
            "C:\Program Files (x86)\NSIS",
            "$env:ProgramData\chocolatey\lib\nsis\tools"
          )

          foreach ($dir in $candidates) {
            if (Test-Path (Join-Path $dir "makensis.exe")) {
              return $dir
            }
          }

          return $null
        }

        $nsisDir = Get-NSISDir
        if ($nsisDir) {
          Write-Host "NSIS already available on runner."
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          exit 0
        }

        try {
          winget install --id NSIS.NSIS --exact --accept-source-agreements --accept-package-agreements
        }
        catch {
          Write-Warning "Winget install failed: $($_.Exception.Message)"
        }

        if (-not (Get-NSISDir)) {
          try {
            choco install nsis -y --no-progress
          }
          catch {
            Write-Warning "Chocolatey install failed: $($_.Exception.Message)"
          }
        }

        if (-not (Get-NSISDir)) {
          throw "Failed to install NSIS using both Chocolatey and Winget."
        }

        $nsisDir = Get-NSISDir
        $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Create installer
      id: create_installer
      run: |
        mkdir -p gui/target
        VERSION=$(pdm run python -c "from importlib.metadata import version; print(version('ytmusic-deleter'))")
        NUM_VERSION=$(pdm run python -c "import re; from importlib.metadata import version as pkg_version; version=pkg_version('ytmusic-deleter'); m=re.match(r'^(\\d+)\\.(\\d+)\\.(\\d+)(?:[.-]dev(\\d+))?', version); print( f'{m.group(1)}.{m.group(2)}.{m.group(3)}.{m.group(4) or 0}' if m else '.'.join((re.findall(r'\\d+', version)+['0','0','0','0'])[:4]) )")
        makensis -DVERSION="$VERSION" -DNUM_VERSION="$NUM_VERSION" gui/src/installer/windows/Installer.nsi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Save .exe as artifact
      uses: actions/upload-artifact@v7
      with:
        name: YTMusic_Deleter-${{ steps.create_installer.outputs.version }}-Windows-Installer.exe
        path: ./gui/target/YTMusic_Deleter-${{ steps.create_installer.outputs.version }}-Windows-Installer.exe
        archive: false

  verify:
    runs-on: windows-latest
    needs: build
    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: YTMusic_Deleter-${{ needs.build.outputs.installer-version }}-Windows-Installer.exe

      - name: Run installer
        shell: cmd
        run: |
          .\YTMusic_Deleter-${{ needs.build.outputs.installer-version }}-Windows-Installer.exe /S

      - name: Run application
        uses: nick-fields/retry@v4
        with:
          shell: bash
          command: |
            # Makes app run headless
            export QT_QPA_PLATFORM=offscreen

            # Launch the installed app and kill it after 10s
            set +e
            timeout 10s "$LOCALAPPDATA/YTMusic_Deleter/YTMusic_Deleter.exe"
            status=$?
            set -e
            if [ "$status" = 124 ]; then
              echo "GUI started and was still running after 10s"
            else
              echo "GUI failed with exit code $status"
              exit 1
            fi
          max_attempts: 5
          timeout_minutes: 10
