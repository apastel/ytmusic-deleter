# This workflow is automatically run when a new tag is pushed (either manually or with "Create Tag" workflow)

name: Release and Publish

on:
  push:
    tags:
      - '**'
  workflow_call:
  workflow_dispatch:
    inputs:
      publish-pypi:
        description: 'Skip publishing this release to PyPI?'
        type: choice
        required: false
        default: 'Do not skip'
        options:
          - 'Do not skip'
          - 'Skip'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-exe:
    uses: ./.github/workflows/build-exe.yml
    secrets: inherit
  build-deb:
    uses: ./.github/workflows/build-deb.yml
    secrets: inherit
  build-dmg:
    uses: ./.github/workflows/build-dmg.yml
    secrets: inherit


  build-wheel:
    name: Build PyPI dist
    runs-on: ubuntu-latest
    needs:
      - build-exe
      - build-deb
      - build-dmg

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - uses: pdm-project/setup-pdm@v4
    - name: Build a binary wheel and a source tarball
      run: pdm build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: |
      Publish to PyPI
    needs:
    - build-wheel
    if: ${{ inputs.publish-pypi != 'Skip' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Draft GitHub Release
    needs:
      - build-wheel
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases

    steps:
    - name: Draft GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh release create \
        '${{ github.ref_name }}' \
        --repo '${{ github.repository }}' \
        --generate-notes \
        --draft

    - name: Resolve release version
      id: release-version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download Windows installer
      uses: actions/download-artifact@v8
      with:
        name: YTMusic_Deleter-${{ steps.release-version.outputs.version }}-Windows-Installer.exe
    - name: Download Linux installer
      uses: actions/download-artifact@v8
      with:
        name: ytmusic-deleter_${{ steps.release-version.outputs.version }}_amd64.deb
    - name: Download macOS 14 installer
      uses: actions/download-artifact@v8
      with:
        name: YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-14-Installer_arm.dmg
    - name: Download macOS 15 installer
      uses: actions/download-artifact@v8
      with:
        name: YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-15-Installer_arm.dmg
    - name: Download macOS 26 installer
      uses: actions/download-artifact@v8
      with:
        name: YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-26-Installer_arm.dmg
    - name: Upload executable installers to Github Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh release upload \
        '${{ github.ref_name }}' \
        --repo '${{ github.repository }}' \
        YTMusic_Deleter-${{ steps.release-version.outputs.version }}-Windows-Installer.exe \
        ytmusic-deleter_${{ steps.release-version.outputs.version }}_amd64.deb \
        YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-14-Installer_arm.dmg \
        YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-15-Installer_arm.dmg \
        YTMusic_Deleter-${{ steps.release-version.outputs.version }}-MacOS-26-Installer_arm.dmg
