# This workflow builds and tests the macOS installer for YTMusic Deleter.

name: Build and Verify (macOS)

on:
  push:
    branches: # prevent push on tags since that's handled by another workflow
      - '**'
    paths-ignore:
      - '**.md'
      - '.flake8'
      - '.gitignore'
      - '.pre-commit-comfig.yaml'
      - '**/build-exe.yml'
      - '**/build-deb.yml'
      - '**/pytest.yml'
      - '**/release.yml'
  pull_request_target:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 10 * * *'

concurrency:
  group: build-dmg-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    outputs:
      installer-version: ${{ steps.create_installer.outputs.version }}
    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: pdm-project/setup-pdm@main
      with:
        cache: false

    - name: Resolve PDM cache dir
      id: pdm-cache
      run: echo "dir=$(pdm config cache_dir)" >> $GITHUB_OUTPUT

    - name: Cache PDM
      uses: actions/cache@v5
      with:
        path: ${{ steps.pdm-cache.outputs.dir }}
        key: ${{ runner.os }}-${{ matrix.os }}-pdm-${{ hashFiles('**/pdm.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.os }}-pdm-

    - name: Install dependencies
      run: |

        pdm install --no-editable

        # adds `timeout` command
        brew install coreutils

    - name: Run CLI from venv
      id: run-cli
      run: |
        . .venv/bin/activate
        echo "version=$(ytmusic-deleter --version)"

    - name: Run GUI app
      run: |

        # Makes app run headless
        export QT_QPA_PLATFORM=offscreen

        # Launch the GUI app and kill it after 10 seconds, saving the output.
        set +e
        timeout 10s pdm gui
        status=$?
        set -e
        if [ "$status" = 124 ]; then
          echo "GUI started and was still running after 10s"
        else
          echo "GUI failed with exit code $status"
          exit 1
        fi

    - name: Freeze exe
      run: |
        pdm run pyinstaller gui/src/main/python/gui.spec

    - name: Run frozen exe
      run: |

        # Makes app run headless
        export QT_QPA_PLATFORM=offscreen

        # Launch the frozen app and kill it after 10 seconds
        set +e
        timeout 10s ./dist/YTMusic_Deleter/YTMusic_Deleter
        status=$?
        set -e
        if [ "$status" = 124 ]; then
          echo "GUI started and was still running after 10s"
        else
          echo "GUI failed with exit code $status"
          exit 1
        fi

    - name: Create installer
      id: create_installer
      run: |
        brew install create-dmg
        VERSION=$(pdm run python -c "from importlib.metadata import version; print(version('ytmusic-deleter'))")
        create-dmg \
          --volname "YTMusic Deleter" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "YTMusic_Deleter" 200 190 \
          --app-drop-link 600 185 \
          "mac-installer-to-be-renamed.dmg" \
          "./dist/YTMusic_Deleter"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename installer per version
      id: rename-installer
      run: |

        if [[ "${{ matrix.os }}" == "macos-14" ]]; then
          MAC_VERSION=14
        elif [[ "${{ matrix.os }}" == "macos-15" ]]; then
          MAC_VERSION=15
        elif [[ "${{ matrix.os }}" == "macos-26" ]]; then
          MAC_VERSION=26
        fi
        FILE_NAME="YTMusic_Deleter-${{ steps.create_installer.outputs.version }}-MacOS-$MAC_VERSION-Installer_arm.dmg"
        mv ./mac-installer-to-be-renamed.dmg "./$FILE_NAME"

        echo "file-name=$FILE_NAME" >> $GITHUB_OUTPUT

    - name: Save .dmg as artifact
      id: upload_dmg
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.rename-installer.outputs.file-name }}
        path: ./${{ steps.rename-installer.outputs.file-name }}
        archive: false

  verify:
    strategy:
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    needs: build
    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: YTMusic_Deleter-${{ needs.build.outputs.installer-version }}-MacOS-${{ fromJson('{"macos-14":"14","macos-15":"15","macos-26":"26"}')[matrix.os] }}-Installer_arm.dmg

      - name: Attach app image
        run: |

          # Have to redefine MAC_VERSION
          if [[ "${{ matrix.os }}" == "macos-14" ]]; then
            MAC_VERSION=14
          elif [[ "${{ matrix.os }}" == "macos-15" ]]; then
            MAC_VERSION=15
          elif [[ "${{ matrix.os }}" == "macos-26" ]]; then
            MAC_VERSION=26
          fi
          hdiutil attach ./YTMusic_Deleter-${{ needs.build.outputs.installer-version }}-MacOS-$MAC_VERSION-Installer_arm.dmg

      - name: Install dependencies
        run: |

          # adds `timeout` command
          brew install coreutils

      - name: List Volumes
        shell: pwsh
        run: |
          Get-ChildItem -Path "/Volumes" -Recurse

      - name: Run application
        run: |

          # Makes app run headless
          export QT_QPA_PLATFORM=offscreen

          # Launch the installed app and kill it after 10s
          set +e
          timeout 10s "/Volumes/YTMusic Deleter/YTMusic_Deleter"
          status=$?
          set -e
          if [ "$status" = 124 ]; then
            echo "GUI started and was still running after 10s"
          else
            echo "GUI failed with exit code $status"
            exit 1
          fi
